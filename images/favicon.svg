<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2e0a"/>
      <stop offset="100%" style="stop-color:#003300"/>
    </linearGradient>
    <linearGradient id="blade1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#8DC63F"/>
    </linearGradient>
    <linearGradient id="blade2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Rounded border -->
  <rect x="35" y="55" width="442" height="380" rx="45" fill="none" stroke="#4CAF50" stroke-width="14"/>
  <!-- Left grass blade group -->
  <path d="M 256 420 Q 200 300 130 110" fill="none" stroke="url(#blade1)" stroke-width="32" stroke-linecap="round"/>
  <path d="M 256 420 Q 215 310 170 160" fill="none" stroke="url(#blade2)" stroke-width="26" stroke-linecap="round"/>
  <!-- Right grass blade group -->
  <path d="M 256 420 Q 312 300 382 110" fill="none" stroke="url(#blade1)" stroke-width="32" stroke-linecap="round"/>
  <path d="M 256 420 Q 297 310 342 160" fill="none" stroke="url(#blade2)" stroke-width="26" stroke-linecap="round"/>
</svg>